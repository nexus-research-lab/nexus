version: "2"

sql:
  - engine: sqlite
    queries: "db/queries/sqlite"
    schema: "db/migrations/sqlite"
    gen:
      go:
        package: sqlitesqlc
        out: "internal/storage/sqlite/sqlc"
        emit_json_tags: true
        emit_interface: true

  - engine: postgresql
    queries: "db/queries/postgres"
    schema: "db/migrations/postgres"
    gen:
      go:
        package: postgressqlc
        out: "internal/storage/postgres/sqlc"
        emit_json_tags: true
        emit_interface: true
