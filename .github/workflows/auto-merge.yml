name: Auto Merge with AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches-ignore:
      - main
      - 'gh-pages'

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OpenClaw AI Review
        env:
          WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            echo "🚀 Triggering OpenClaw webhook..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "event": "github_trigger",
                "repo": "${{ github.repository }}",
                "action": "${{ github.event_name }}",
                "pr_number": "${{ github.event.pull_request.number }}",
                "branch": "${{ github.ref_name }}",
                "sender": "${{ github.actor }}",
                "sha": "${{ github.sha }}"
              }')

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            echo "HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ OpenClaw triggered successfully"
            else
              echo "⚠️ Failed to trigger OpenClaw"
            fi
          else
            echo "⚠️ OPENCLAW_WEBHOOK_URL not configured"
          fi

  add-labels:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI
        run: sleep 10

      - name: Check CI status
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(gh pr checks ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>&1 || echo "pending")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Add monitoring label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label "🤖-ai-monitoring"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "🤖 **AI Monitor Active**

          This PR is being monitored by OpenClaw AI system.

          - **Status:** Monitoring
          - **CI:** Pending
          - **AI Review:** Will be processed automatically
          - **Auto-merge:** Enabled (if AI approves and CI passes)

          The PR will be automatically merged if AI review passes."

      - name: Create status check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state='pending' \
            -f context='ai-review/openclaw' \
            -f description='Waiting for AI review...' \
            -f target_url='https://github.com/${{ github.repository }}/actions'
