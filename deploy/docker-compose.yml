x-logging:
  logging: &default-logging
    driver: "local"
    options:
      max-size: "10m"
      max-file: "3"

services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
    image: ${IMAGE:-nexus}:app-${TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_TYPE: gunicorn
      HOST: 0.0.0.0
      PORT: 8010
      WORKERS: ${WORKERS:-1}
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////home/agent/.nexus/data/nexus.db}
      CACHE_FILE_DIR: ${CACHE_FILE_DIR:-/home/agent/.nexus/cache}
      LOG_PATH: ${LOG_PATH:-/home/agent/.nexus/logs}
      WORKSPACE_PATH: ${WORKSPACE_PATH:-/home/agent/.nexus/workspace}
    volumes:
      - ${HOST_DATA_DIR:-./data}/.nexus:/home/agent/.nexus
      - ${HOST_DATA_DIR:-./data}/.claude:/home/agent/.claude
      - ${HOST_DATA_DIR:-./data}/.claude.json:/home/agent/.claude.json
    expose:
      - "8010"
    logging: *default-logging

  nginx:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_API_URL: ${VITE_API_URL:-}
    image: ${IMAGE:-nexus}:web-${TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${HTTP_PORT:-80}:80"
    logging: *default-logging
